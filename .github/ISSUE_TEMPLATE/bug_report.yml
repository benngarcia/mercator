name: Bug report
description: Report incorrect Mercator behavior with reproduction evidence.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, request bodies, logs, or screenshots that reproduce the issue.
      placeholder: |
        1. Start server with ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Commit, OS, Go version, adapter, and relevant env vars with secrets removed.
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk area
      options:
        - run lifecycle / idempotency
        - auth / workspace isolation
        - secrets / credentials / report tokens
        - cleanup / no-orphan behavior
        - scheduler / placement decision
        - CLI / SDK / console
        - documentation
        - other
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else maintainers should know.
