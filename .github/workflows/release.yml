name: Release

# Releases qualify the exact merge commit before publishing any semver name.
# The full Go suite boots the production daemon twice against each synthetic
# previous-release fixture and replays its Run through the authenticated API.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create and release (e.g. v0.6.0 or v0.6.0-rc.1). Releases the selected merge commit."
        required: true

permissions:
  contents: write

jobs:
  version:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      candidate_sha: ${{ steps.resolve.outputs.candidate_sha }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Resolve and validate
        id: resolve
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          version="$VERSION_INPUT"
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            version="$GITHUB_REF_NAME"
          fi
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version must look like v0.6.0 or v0.6.0-rc.1, got '$version'"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] &&
             git ls-remote --exit-code origin "refs/tags/$version" >/dev/null; then
            echo "::error::tag $version already exists; releases are immutable"
            exit 1
          fi

          candidate_sha="$(git rev-parse 'HEAD^{commit}')"
          if ! git merge-base --is-ancestor "$candidate_sha" origin/master; then
            echo "::error::candidate $candidate_sha is not on origin/master"
            exit 1
          fi
          parent_count="$(git rev-list --parents -n 1 "$candidate_sha" | awk '{print NF - 1}')"
          if [[ "$parent_count" -lt 2 ]]; then
            echo "::error::candidate $candidate_sha is not a merge commit"
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi
          {
            echo "version=$version"
            echo "candidate_sha=$candidate_sha"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

  release:
    name: Qualify and publish release
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.candidate_sha }}
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - name: Qualify release
        run: go test ./...
      - name: Build archives
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: scripts/build-release-archives.sh "$VERSION" dist
      - name: Publish GitHub release
        env:
          CANDIDATE_SHA: ${{ needs.version.outputs.candidate_sha }}
          GH_TOKEN: ${{ github.token }}
          PRERELEASE: ${{ needs.version.outputs.prerelease }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          args=()
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            args+=(--target "$CANDIDATE_SHA")
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease --latest=false)
          fi
          notes_file="docs/project/release-notes/${VERSION}.md"
          if [[ -f "$notes_file" ]]; then
            gh release create "$VERSION" dist/* --title "$VERSION" --notes-file "$notes_file" "${args[@]}"
          else
            gh release create "$VERSION" dist/* --generate-notes "${args[@]}"
          fi

  image:
    name: Publish image
    needs:
      - version
      - release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: ""
            dockerfile: ./Dockerfile
            platforms: linux/amd64
          - suffix: -conformance-probe
            dockerfile: ./conformance/Dockerfile
            platforms: linux/amd64,linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.candidate_sha }}
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          # Stable semver receives major.minor and latest automatically.
          # Prereleases receive only their full version tag.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.version }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
