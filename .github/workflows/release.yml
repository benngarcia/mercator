name: Release

# Two ways to release, both deliberate — nothing here runs on ordinary pushes:
# - push an annotated tag `v*` (the original flow), or
# - trigger this workflow manually from the Actions tab with a version input;
#   the run validates the version, then `gh release create --target` mints the
#   tag at the selected branch's head as part of publishing. The tag is created
#   inside the release job on purpose: a tag pushed by a separate workflow with
#   the default GITHUB_TOKEN would not trigger this one.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create and release (e.g. v0.2.0). Releases the head of the selected branch."
        required: true

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve and validate
        id: resolve
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ! "$VERSION_INPUT" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::version must look like v0.2.0 or v0.2.0-rc.1, got '$VERSION_INPUT'"
            exit 1
          fi
          if git ls-remote --exit-code origin "refs/tags/$VERSION_INPUT" >/dev/null; then
            echo "::error::tag $VERSION_INPUT already exists; releases are immutable"
            exit 1
          fi
          echo "version=$VERSION_INPUT" >> "$GITHUB_OUTPUT"

  release:
    name: Build release artifacts
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: go test ./...
      - name: Build archives
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: scripts/build-release-archives.sh "$VERSION" dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          args=()
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            # Manual dispatch: create the tag at the dispatched commit as part
            # of publishing the release.
            args+=(--target "$GITHUB_SHA")
          fi
          notes_file="docs/project/release-notes/${VERSION}.md"
          if [[ -f "$notes_file" ]]; then
            gh release create "$VERSION" dist/* --title "$VERSION" --notes-file "$notes_file" "${args[@]}"
          else
            gh release create "$VERSION" dist/* --generate-notes "${args[@]}"
          fi

  image:
    name: Publish image
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: ""
            dockerfile: ./Dockerfile
            platforms: linux/amd64
          - suffix: -conformance-probe
            dockerfile: ./conformance/Dockerfile
            platforms: linux/amd64,linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          # `value:` pins the semver source to the resolved version so the same
          # tags come out whether the run started from a tag push or a manual
          # dispatch on a branch.
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.version }}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
