name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - name: Build archives
        run: scripts/build-release-archives.sh "$GITHUB_REF_NAME" dist
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes_file="docs/project/release-notes/${GITHUB_REF_NAME}.md"
          if [[ -f "$notes_file" ]]; then
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
          fi
