name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go build ./...
      - run: scripts/build-release-archives.sh v0.0.0-ci /tmp/mercator-release-dist

  sdks:
    name: SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: scripts/check-open-source-launch.sh
      - run: npm ci
        working-directory: sdk/typescript
      - run: npm test
        working-directory: sdk/typescript
      - run: python -m unittest discover -s tests
        working-directory: sdk/python
      - run: bundle install
        working-directory: sdk/ruby
      - run: bundle exec ruby -Ilib:test test/test_client.rb
        working-directory: sdk/ruby

  console:
    name: Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
        working-directory: web/app
      - run: bun run typecheck
        working-directory: web/app
      - run: bun run build
        working-directory: web/app

  image:
    name: Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      # Pull requests build the image to prove the Dockerfile is valid, but do
      # not log in or push. Only pushes to master publish to ghcr.io.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
