name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - run: go generate ./...
      - run: git diff --exit-code
      - run: go test ./...
      - run: go build ./...
      - run: scripts/build-release-archives.sh v0.0.0-ci /tmp/mercator-release-dist
      - run: scripts/check-open-source-launch.sh

  console:
    name: Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
        working-directory: web/app
      - run: bun run generate:api
        working-directory: web/app
      - run: git diff --exit-code
      - run: bun run check:react-effects
        working-directory: web/app
      - run: bun run typecheck
        working-directory: web/app
      - run: bun run test
        working-directory: web/app
      - run: bun run build
        working-directory: web/app
      - run: git diff --exit-code
      - run: bunx playwright install --with-deps chromium
        working-directory: web/app
      - run: go test -count=1 ./internal/httpapi -run '^TestConsoleRunsNavigation$'
        env:
          MERCATOR_BROWSER_TEST: "1"

  image:
    name: Image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: ""
            dockerfile: ./Dockerfile
            platforms: linux/amd64
          - suffix: -conformance-probe
            dockerfile: ./conformance/Dockerfile
            platforms: linux/amd64,linux/arm64
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      # Pull requests build the image to prove the Dockerfile is valid, but do
      # not log in or push. Only pushes to master publish to ghcr.io.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.suffix }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
