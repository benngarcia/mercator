name: Lab Campaigns

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:
    inputs:
      fuzztime:
        description: Duration for each generated Lab fuzz campaign
        required: false
        default: 5m

jobs:
  generated-worlds:
    name: Generated worlds
    runs-on: ubuntu-latest
    env:
      MERCATOR_LAB_FUZZTIME: ${{ inputs.fuzztime || '5m' }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./internal/lab ./internal/scenario -count=1
      - run: go test ./internal/lab -run '^$' -fuzz '^FuzzGeneratedBlueprintCompilesAndPreservesInvariants$' -fuzztime="$MERCATOR_LAB_FUZZTIME" -parallel=1
      - run: go test ./internal/scenario -run '^$' -fuzz '^FuzzScenarioSessionCommandsPreserveEventInvariants$' -fuzztime="$MERCATOR_LAB_FUZZTIME" -parallel=1

  browser-proof:
    name: Browser proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"
      - run: bun install --frozen-lockfile
        working-directory: web/app
      # The console is embedded from web/static, which is not committed. Without
      # this build the served page has no assets and the browser proof fails at
      # startup.
      - run: bun run build
        working-directory: web/app
      - run: bunx playwright install --with-deps chromium
        working-directory: web/app
      - run: go test -count=1 ./internal/lab -run '^TestLabConsoleUsesNormalAPIAndSSE$'
        env:
          MERCATOR_BROWSER_TEST: "1"
